name: 每日更新金属数据

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行数据抓取脚本
        env:
          METALS_DEV_API_KEY: ${{ secrets.METALS_DEV_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_data.py

      - name: 提交更新后的数据文件
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json history.json
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add data.json history.json
          git diff --quiet --cached || git commit -m "自动更新数据 $(date -u)"
          git push
