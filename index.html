<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>众智创新 · 金属价格实时追踪</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js"></script>

<style>
:root {
  --bg:         #ffffff;
  --surface:    #f5f7fa;
  --surface2:   #eef1f6;
  --border:     #d8dde6;
  --border-lt:  #e8ecf2;
  --title:      #1a3a5c;
  --title-dk:   #0f2a47;
  --text:       #3d4f63;
  --text2:      #6b7d92;
  --accent:     #2e7bbf;
  --accent-lt:  #e8f1fa;
  --accent-dk:  #1a5a96;
  --gold:       #c8993a;
  --green:      #2e9e5a;
  --red:        #c9433a;
  --font-title: 'Noto Serif SC', serif;
  --font-body:  'Noto Sans SC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.8;
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
a { color: var(--accent); text-decoration: none; transition: color .2s; }
a:hover { color: var(--accent-dk); }

/* ===== Header ===== */
.header { padding: 40px 0 28px; text-align: center; }
.header-logo { width: 72px; height: 72px; margin-bottom: 12px; }
.header h1 {
  font-family: var(--font-title); font-size: 2.2rem; font-weight: 700;
  color: var(--title-dk); letter-spacing: 2px; margin-bottom: 4px;
}
.header .subtitle { color: var(--text2); font-size: 0.88rem; letter-spacing: 1px; }
.update-badge {
  display: inline-block; margin-top: 14px; padding: 5px 16px; border-radius: 20px;
  background: var(--accent-lt); border: 1px solid var(--border-lt);
  font-size: 0.78rem; color: var(--accent-dk);
}
.header-line {
  width: 50px; height: 3px; background: var(--accent);
  margin: 18px auto 0; border-radius: 2px;
}

/* ===== Sections ===== */
.section { margin-top: 44px; }
.section-title {
  font-family: var(--font-title); font-size: 1.35rem; font-weight: 700;
  color: var(--title); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
}
.section-title .icon { font-size: 1.2rem; }

/* ===== Price Grid ===== */
.price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.price-card {
  background: var(--surface); border: 1px solid var(--border-lt); border-radius: 10px;
  padding: 18px 20px; transition: transform .2s, box-shadow .2s;
}
.price-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(26,58,92,0.07); }
.price-card .metal-name {
  font-size: 0.8rem; color: var(--text2); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 5px; font-weight: 500;
}
.price-card .metal-price {
  font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; color: var(--title-dk);
}
.price-card .metal-price.na { color: var(--text2); font-size: 0.95rem; font-weight: 500; }
.price-card .metal-unit { font-size: 0.7rem; color: var(--text2); margin-top: 3px; }

/* ===== Chart ===== */
.chart-container {
  background: var(--surface); border: 1px solid var(--border-lt); border-radius: 12px; padding: 24px;
}
.chart-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; line-height: 2.2; }
.chart-btn {
  padding: 5px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--title); font-family: var(--font-body);
  font-size: 0.82rem; cursor: pointer; transition: all .15s; user-select: none; font-weight: 500;
}
.chart-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.chart-btn.active { background: var(--title); border-color: var(--title); color: #fff; }
.chart-btn.all-btn { border-color: var(--accent); color: var(--accent); }
.chart-btn.all-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chart-hint { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 0.9rem; line-height: 2; }
#priceChart { max-height: 420px; }

/* ===== News / Tweet ===== */
.list-card {
  background: var(--surface); border: 1px solid var(--border-lt); border-radius: 10px;
  padding: 18px 22px; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s;
}
.list-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(46,123,191,0.06); }
.list-card .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; line-height: 1.6; color: var(--title); }
.list-card .card-title a { color: var(--title); }
.list-card .card-title a:hover { color: var(--accent); }
.list-card .card-meta { font-size: 0.78rem; color: var(--text2); display: flex; gap: 14px; flex-wrap: wrap; }
.list-card .card-desc { font-size: 0.85rem; color: var(--text2); margin-top: 8px; line-height: 1.7; }

/* ===== Empty / Loading ===== */
.empty-state {
  text-align: center; padding: 40px; color: var(--text2); background: var(--surface);
  border-radius: 10px; border: 1px dashed var(--border);
}
.loading-spinner {
  display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Footer ===== */
.footer {
  text-align: center; padding: 48px 0 32px; color: var(--text2); font-size: 0.78rem;
  border-top: 1px solid var(--border-lt); margin-top: 48px;
}

/* ===== Animations ===== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp .45s ease-out both; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .header h1 { font-size: 1.6rem; }
  .price-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .price-card { padding: 14px; }
  .price-card .metal-price { font-size: 1.15rem; }
  .chart-container { padding: 16px; }
  .chart-btn { padding: 4px 12px; font-size: 0.75rem; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <img src="LOGO.png" alt="众智创新" class="header-logo">
    <h1>金属价格实时追踪</h1>
    <div class="subtitle">贵金属 & 有色金属 · 价格 / 走势 / 新闻 / 推文</div>
    <div class="header-line"></div>
    <div class="update-badge" id="updateTime">加载中...</div>
  </div>

  <!-- Prices -->
  <div class="section">
    <div class="section-title"><span class="icon">💰</span> 实时价格</div>
    <div class="price-grid" id="priceGrid">
      <div class="empty-state"><div class="loading-spinner"></div><br>正在加载价格...</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="section">
    <div class="section-title"><span class="icon">📈</span> 价格走势（最近 60 天）</div>
    <div class="chart-container">
      <div class="chart-filters" id="chartFilters"></div>
      <div id="chartArea"><canvas id="priceChart"></canvas></div>
      <div class="chart-hint" id="chartHint" style="display:none;">
        数据积累中...<br>脚本每天运行一次，运行天数越多曲线越完整。<br>目前仅有 1 天数据，至少需要 2 天才能显示走势图。
      </div>
    </div>
  </div>

  <!-- News -->
  <div class="section">
    <div class="section-title"><span class="icon">📰</span> 金属最新新闻</div>
    <div id="newsList">
      <div class="empty-state"><div class="loading-spinner"></div><br>正在加载新闻...</div>
    </div>
  </div>

  <!-- Tweets -->
  <div class="section">
    <div class="section-title"><span class="icon">🐦</span> X / Twitter 推文</div>
    <div id="tweetList">
      <div class="empty-state"><div class="loading-spinner"></div><br>正在加载推文...</div>
    </div>
  </div>

  <div class="footer">
    众智创新 · 金属价格实时追踪<br>
    数据由 Metals.dev / NewsAPI / X API 提供
  </div>
</div>

<script>
// ===== 颜色 =====
const METAL_COLORS = {
  gold:       { line: '#c8993a' },
  silver:     { line: '#7a8b9c' },
  platinum:   { line: '#5b8fb9' },
  palladium:  { line: '#9b6b8a' },
  copper:     { line: '#c06030' },
  aluminum:   { line: '#4e9e6d' },
  nickel:     { line: '#4578a0' },
  zinc:       { line: '#7b68ae' },
  lead:       { line: '#6e7e8c' },
  lme_zinc:   { line: '#9b7ecc' },
  lme_nickel: { line: '#3a8ebd' },
  lme_copper: { line: '#d47840' },
};

const METAL_NAMES = {
  gold: '黄金', silver: '白银', platinum: '铂', palladium: '钯',
  copper: '铜', aluminum: '铝', nickel: '镍', zinc: '锌', lead: '铅',
  lme_zinc: 'LME锌', lme_nickel: 'LME镍', lme_copper: 'LME铜',
};

let chartInstance = null;
let historyData = [];
let activeMetals = new Set(Object.keys(METAL_COLORS));

// ===== 加载数据 =====
(async function () {
  let data;
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error();
    data = await resp.json();
  } catch {
    document.getElementById('priceGrid').innerHTML = '<div class="empty-state">⚠ 无法加载 data.json</div>';
    document.getElementById('newsList').innerHTML = '';
    document.getElementById('tweetList').innerHTML = '';
    return;
  }

  try {
    const resp2 = await fetch('history.json');
    if (resp2.ok) historyData = await resp2.json();
  } catch { historyData = []; }

  document.getElementById('updateTime').textContent = '🕐 数据更新于 ' + (data.updated_at || '未知');
  renderPrices(data.prices);
  renderChart();
  renderNews(data.news);
  renderTweets(data.tweets);
})();

// ===== 价格卡片 =====
function renderPrices(prices) {
  const grid = document.getElementById('priceGrid');
  if (!prices || !prices.length) { grid.innerHTML = '<div class="empty-state">暂无价格数据</div>'; return; }
  grid.innerHTML = prices.map((p, i) => {
    const has = p.price_usd != null;
    const txt = has ? `$${Number(p.price_usd).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}` : 'N/A';
    return `<div class="price-card fade-up" style="animation-delay:${i*50}ms">
      <div class="metal-name">${esc(p.name)}</div>
      <div class="metal-price${has?'':' na'}">${txt}</div>
      <div class="metal-unit">${esc(p.unit||'')}</div>
    </div>`;
  }).join('');
}

// ===== 走势图 =====
function renderChart() {
  const filtersEl = document.getElementById('chartFilters');
  const hintEl = document.getElementById('chartHint');
  const chartArea = document.getElementById('chartArea');

  let btns = '<button class="chart-btn all-btn active" onclick="toggleAll(this)">全部</button>';
  for (const [code, name] of Object.entries(METAL_NAMES)) {
    btns += `<button class="chart-btn active" data-metal="${code}" onclick="toggleMetal(this,'${code}')">${name}</button>`;
  }
  filtersEl.innerHTML = btns;

  if (historyData.length < 2) {
    chartArea.style.display = 'none';
    hintEl.style.display = 'block';
    return;
  }
  hintEl.style.display = 'none';
  chartArea.style.display = 'block';
  buildChart();
}

function buildChart() {
  const canvas = document.getElementById('priceChart');
  if (chartInstance) chartInstance.destroy();

  const labels = historyData.map(d => d.date);
  const preciousCodes = ['gold','silver','platinum','palladium'];
  const hasP = [...activeMetals].some(c => preciousCodes.includes(c));
  const hasI = [...activeMetals].some(c => !preciousCodes.includes(c));
  const dual = hasP && hasI;

  const datasets = [];
  for (const code of Object.keys(METAL_COLORS)) {
    if (!activeMetals.has(code)) continue;
    const color = METAL_COLORS[code];
    const values = historyData.map(d => d.prices[code] ?? null);
    const isP = preciousCodes.includes(code);
    datasets.push({
      label: METAL_NAMES[code],
      data: values,
      borderColor: color.line,
      backgroundColor: 'transparent',
      borderWidth: 2.5,
      pointRadius: historyData.length > 30 ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.3,
      fill: false,
      yAxisID: dual ? (isP ? 'yLeft' : 'yRight') : 'yLeft',
      spanGaps: true,
    });
  }

  const scales = {
    x: {
      ticks: { color: '#6b7d92', maxRotation: 45, font: { size: 11 } },
      grid: { color: 'rgba(216,221,230,0.6)' },
    },
    yLeft: {
      type: 'linear', position: 'left',
      title: { display: true, text: hasP ? 'USD / 盎司 (贵金属)' : 'USD / 吨 (工业金属)', color: '#6b7d92', font: { size: 12 } },
      ticks: { color: '#6b7d92', font: { size: 11 }, callback: v => '$' + v.toLocaleString() },
      grid: { color: 'rgba(216,221,230,0.5)' },
    },
  };
  if (dual) {
    scales.yLeft.title.text = 'USD / 盎司 (贵金属)';
    scales.yRight = {
      type: 'linear', position: 'right',
      title: { display: true, text: 'USD / 吨 (工业金属)', color: '#6b7d92', font: { size: 12 } },
      ticks: { color: '#6b7d92', font: { size: 11 }, callback: v => '$' + v.toLocaleString() },
      grid: { drawOnChartArea: false },
    };
  }

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff', borderColor: '#d8dde6', borderWidth: 1,
          titleColor: '#1a3a5c', bodyColor: '#3d4f63', padding: 12,
          callbacks: { label: ctx => ctx.parsed.y == null ? '' : `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` }
        },
      },
      scales,
    }
  });
}

// ===== 按钮交互 =====
function toggleMetal(btn, code) {
  if (activeMetals.has(code)) { activeMetals.delete(code); btn.classList.remove('active'); }
  else { activeMetals.add(code); btn.classList.add('active'); }
  syncAllBtn();
  if (historyData.length >= 2) buildChart();
}

function toggleAll(btn) {
  const all = Object.keys(METAL_COLORS);
  const allActive = activeMetals.size === all.length;
  if (allActive) { activeMetals.clear(); btn.classList.remove('active'); }
  else { all.forEach(c => activeMetals.add(c)); btn.classList.add('active'); }
  document.querySelectorAll('.chart-btn[data-metal]').forEach(b => {
    if (activeMetals.has(b.dataset.metal)) b.classList.add('active');
    else b.classList.remove('active');
  });
  if (historyData.length >= 2) buildChart();
}

function syncAllBtn() {
  const btn = document.querySelector('.all-btn');
  if (activeMetals.size === Object.keys(METAL_COLORS).length) btn.classList.add('active');
  else btn.classList.remove('active');
}

// ===== 新闻 =====
function renderNews(news) {
  const el = document.getElementById('newsList');
  if (!news || !news.length) { el.innerHTML = '<div class="empty-state">暂无新闻</div>'; return; }
  el.innerHTML = news.map((n, i) => `
    <div class="list-card fade-up" style="animation-delay:${i*50}ms">
      <div class="card-title"><a href="${escA(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a></div>
      <div class="card-meta"><span>📌 ${esc(n.source)}</span><span>🕐 ${fmtDate(n.published)}</span></div>
      ${n.description ? `<div class="card-desc">${esc(n.description)}</div>` : ''}
    </div>`).join('');
}

// ===== 推文 =====
function renderTweets(tweets) {
  const el = document.getElementById('tweetList');
  if (!tweets || !tweets.length) { el.innerHTML = '<div class="empty-state">未获取到推文（可能未配置 Twitter API）</div>'; return; }
  el.innerHTML = tweets.map((t, i) => `
    <div class="list-card fade-up" style="animation-delay:${i*50}ms">
      <div class="card-title">${esc(t.text)}</div>
      <div class="card-meta"><span>🕐 ${fmtDate(t.created_at)}</span>
      <a href="${escA(t.url)}" target="_blank" rel="noopener">查看原文 →</a></div>
    </div>`).join('');
}

// ===== 工具 =====
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function escA(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function fmtDate(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return s; }
}
</script>
</body>
</html>
